<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F8FAFC" />
  <title>NYC Tekpair Bharat | Premium FinTech Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=25" />
</head>
<body>
  <main class="shell">
    <div class="chat-app-window">
      <!-- Left Sidebar (inside window) -->
      <aside class="window-sidebar">
        <div class="sidebar-top">
          <h3 class="offers-title">Featured Offers</h3>
          <div class="carousel-container">
            <div class="carousel-slide active">
              <span class="sponsored-badge">Sponsored</span>
              <img src="/static/957602fe0322ce0b89fe2642f4de987b.jpg" alt="Partner Offer 1" class="carousel-img" />
            </div>
            <div class="carousel-slide">
              <span class="sponsored-badge">Sponsored</span>
              <img src="/static/dc0c5e4d2df9bc20e9f816febebb7cb0.jpg" alt="Partner Offer 2" class="carousel-img" />
            </div>
            <div class="carousel-slide">
              <span class="sponsored-badge">Sponsored</span>
              <img src="/static/f60d34e2c076a849b368cd11bc39da11.jpg" alt="Partner Offer 3" class="carousel-img" />
            </div>
            <div class="carousel-slide">
              <span class="sponsored-badge">Sponsored</span>
              <img src="/static/3db75f6b9787dc37d54b3fb99d0b5c6e.jpg" alt="Partner Offer 4" class="carousel-img" />
            </div>
            <div class="carousel-slide">
              <span class="sponsored-badge">Sponsored</span>
              <img src="/static/3e47924ac7c832fd832be55c2cec2db2.jpg" alt="Partner Offer 5" class="carousel-img" />
            </div>
            <div class="carousel-dots">
              <span class="dot active"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        </div>
        <div class="sidebar-bottom">
          <div class="product-status-card">
            <div class="product-header">
              <span class="product-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="product-icon">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
              </span>
              <div class="product-info">
                <h4>Tekpair SecurePay™</h4>
                <p>Routing Protocol v4.2</p>
              </div>
            </div>
            <div class="router-status">
              <span class="status-ping-dot"></span>
              Active Router Node
            </div>
          </div>
        </div>
      </aside>

      <!-- Right Main Chat Workspace -->
      <section class="window-main">
        <header class="window-header">
          <div class="brand-group">
            <div class="brand-logo-container">
              <img src="/static/Tekpair Logo.png" alt="Tekpair Logo" class="brand-logo-img" />
            </div>
            <div class="brand-text">
              <h1>NYC Tekpair <span class="brand-badge">Bharat</span></h1>
              <p class="brand-tagline">Private Wealth & UPI Routing Desk</p>
            </div>
          </div>
          <div class="assistant-node-status">
            <h2>NYC Assistant</h2>
            <p>Autonomous response node active</p>
          </div>
        </header>

        <div id="chat-window" class="chat-window" aria-live="polite"></div>

        <div class="chat-prompts">
          <button type="button" class="prompt-chip" data-prompt="My UPI payment failed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chip-icon">
              <line x1="12" y1="1" x2="12" y2="23"></line>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            UPI payment failed
          </button>
          <button type="button" class="prompt-chip" data-prompt="How do I block my debit card?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chip-icon">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
              <line x1="1" y1="10" x2="23" y2="10"></line>
            </svg>
            Block RuPay/Visa card
          </button>
          <button type="button" class="prompt-chip" data-prompt="What should I do if money is debited twice?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chip-icon">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            Double debit issue
          </button>
          <button type="button" class="prompt-chip" data-prompt="How can I check my account balance?">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chip-icon">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Check balance
          </button>
        </div>

        <form id="chat-form" class="chat-form" autocomplete="off">
          <label class="sr-only" for="user-input">Enter question</label>
          <div class="input-wrapper">
            <input id="user-input" type="text" class="chat-input" placeholder="Ask about UPI, cards, transactions..." />
            <button type="submit" class="submit-button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </form>
      </section>
    </div>
  </main>
  <script src="/static/script.js"></script>
</body>
</html>
